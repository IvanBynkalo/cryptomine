<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚀 Space Rangers: Idle</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap');

:root {
  --bg: #020a14;
  --bg2: #050f1e;
  --card: #0a1628;
  --card2: #0e1f38;
  --border: rgba(0,200,255,0.12);
  --border2: rgba(0,200,255,0.25);
  --cyan: #00c8ff;
  --cyan2: #00ffe5;
  --red: #ff3a3a;
  --orange: #ff8c00;
  --gold: #ffd700;
  --green: #00ff88;
  --purple: #a855f7;
  --text: #c8e0f0;
  --muted: #3a5570;
  --font-mono: 'Share Tech Mono', monospace;
  --font-main: 'Exo 2', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  min-height: 100vh;
  overflow: hidden;
  position: fixed; width: 100%;
}

/* ── SCANLINE OVERLAY ── */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* ── STARS ── */
#starfield { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--d) infinite ease-in-out var(--delay); }
@keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.9} }

/* ── LAYOUT ── */
.screen { position:fixed; inset:0; z-index:10; display:none; flex-direction:column; }
.screen.active { display:flex; }

/* ── HEADER ── */
.hud {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px 8px;
  background: linear-gradient(180deg, rgba(0,20,40,0.95) 0%, rgba(0,10,25,0.8) 100%);
  border-bottom: 1px solid var(--border2);
  flex-shrink:0;
  gap:8px;
}
.hud-stat { display:flex; flex-direction:column; align-items:center; min-width:60px; }
.hud-val { font-family:var(--font-mono); font-size:14px; color:var(--cyan); line-height:1; }
.hud-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.hud-divider { width:1px; height:36px; background:var(--border); }
.ship-name { font-family:var(--font-mono); font-size:11px; color:var(--cyan2); text-align:center; }

/* ── BOTTOM NAV ── */
.nav {
  display:flex; flex-shrink:0;
  background:rgba(2,10,20,0.97);
  border-top:1px solid var(--border2);
  padding-bottom: max(6px, env(safe-area-inset-bottom));
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 4px; border:none; background:none; cursor:pointer;
  transition:all .2s; position:relative;
}
.nav-btn.active::after {
  content:''; position:absolute; bottom:0; left:20%; right:20%;
  height:2px; background:var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
}
.nav-icon { font-size:20px; filter:grayscale(0.5); transition:.2s; }
.nav-btn.active .nav-icon { filter:none; }
.nav-lbl { font-size:9px; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; }
.nav-btn.active .nav-lbl { color:var(--cyan); }

/* ── SCROLL CONTENT ── */
.scroll { flex:1; overflow-y:auto; overflow-x:hidden; padding:12px 14px 8px; }
.scroll::-webkit-scrollbar { width:3px; }
.scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ══════════════════════════════════════
   MINING SCREEN
══════════════════════════════════════ */
.mine-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:14px;
}
.credits-display { }
.credits-lbl { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.credits-val {
  font-family:var(--font-mono); font-size:38px;
  background:linear-gradient(135deg, var(--gold), #ff9500);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.1;
}
.credits-cps { font-size:12px; color:var(--green); margin-top:2px; }

.level-info { text-align:right; }
.level-num { font-family:var(--font-mono); font-size:20px; color:var(--cyan); }
.level-lbl { font-size:9px; color:var(--muted); letter-spacing:1px; }

/* XP */
.bar-row { margin-bottom:10px; }
.bar-header { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.bar-track { height:5px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width .5s ease; }
.xp-fill { background:linear-gradient(90deg, var(--purple), var(--cyan)); box-shadow:0 0 6px var(--purple); }
.energy-fill { background:linear-gradient(90deg, var(--red), var(--orange)); box-shadow:0 0 6px var(--orange); }
.hull-fill { background:linear-gradient(90deg, var(--green), var(--cyan2)); box-shadow:0 0 6px var(--green); }

/* Planet */
.planet-zone {
  display:flex; flex-direction:column; align-items:center;
  margin:8px 0 18px; position:relative;
}
.orbit-ring {
  position:absolute; border-radius:50%; border:1px dashed;
  pointer-events:none; top:50%; left:50%; transform:translate(-50%,-50%);
}
.planet-btn {
  width:160px; height:160px; border-radius:50%; cursor:pointer;
  position:relative; user-select:none; flex-shrink:0;
  transition:transform .1s, box-shadow .1s;
  display:flex; align-items:center; justify-content:center;
  font-size:64px;
}
.planet-btn:active { transform:scale(.9); }
.planet-glow {
  position:absolute; inset:-15px; border-radius:50%;
  animation: pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { opacity:.4; transform:scale(1); }
  50% { opacity:.8; transform:scale(1.05); }
}
.mine-tap-label {
  margin-top:12px; font-family:var(--font-mono); font-size:12px;
  color:var(--cyan); letter-spacing:1px;
}

/* Float numbers */
.float { position:fixed; pointer-events:none; z-index:999;
  font-family:var(--font-mono); font-weight:700; font-size:20px;
  color:var(--gold); text-shadow:0 0 8px rgba(255,215,0,.7);
  animation:floatUp .75s ease-out forwards; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(1.2)} }

/* Upgrades grid */
.section-hdr {
  font-family:var(--font-mono); font-size:11px; color:var(--muted);
  text-transform:uppercase; letter-spacing:3px;
  margin-bottom:10px; margin-top:18px;
  display:flex; align-items:center; gap:8px;
}
.section-hdr::after { content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--border2), transparent); }

.upgrades-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.upg-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:12px 10px; cursor:pointer;
  transition:all .2s; position:relative; overflow:hidden;
}
.upg-card.affordable { border-color:rgba(0,200,255,.35); box-shadow:0 0 12px rgba(0,200,255,.08); }
.upg-card.maxed { border-color:rgba(255,215,0,.3); opacity:.7; cursor:default; }
.upg-card:active:not(.maxed) { transform:scale(.95); }
.upg-icon { font-size:26px; margin-bottom:5px; }
.upg-name { font-size:12px; font-weight:700; margin-bottom:2px; }
.upg-desc { font-size:10px; color:var(--muted); margin-bottom:8px; line-height:1.3; }
.upg-footer { display:flex; justify-content:space-between; align-items:center; }
.upg-dots { display:flex; gap:3px; }
.upg-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.08); }
.upg-dot.on { background:var(--cyan); box-shadow:0 0 4px var(--cyan); }
.upg-cost { font-family:var(--font-mono); font-size:10px; color:var(--gold); }
.upg-cost.dim { color:var(--muted); }

/* ══════════════════════════════════════
   GALAXY MAP
══════════════════════════════════════ */
#galaxy-canvas-wrap {
  flex:1; position:relative; overflow:hidden;
  background: radial-gradient(ellipse at 50% 50%, #060f20 0%, #020810 100%);
}
#galaxy-canvas { width:100%; height:100%; touch-action:none; }

.system-panel {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(2,10,22,0.97); border-top:1px solid var(--border2);
  padding:14px; transform:translateY(100%); transition:transform .3s ease;
}
.system-panel.open { transform:translateY(0); }
.sys-name { font-family:var(--font-mono); font-size:16px; color:var(--cyan); margin-bottom:4px; }
.sys-info { font-size:12px; color:var(--muted); margin-bottom:12px; }
.sys-btns { display:flex; gap:8px; }
.sys-btn {
  flex:1; padding:10px; border-radius:10px; border:1px solid var(--border2);
  background:var(--card2); font-family:var(--font-main); font-size:12px;
  font-weight:700; color:var(--text); cursor:pointer; transition:.2s;
  text-align:center;
}
.sys-btn:active { transform:scale(.95); }
.sys-btn.primary { background:linear-gradient(135deg, rgba(0,200,255,.2), rgba(0,255,229,.1)); border-color:var(--cyan); color:var(--cyan); }
.sys-btn.danger { background:linear-gradient(135deg, rgba(255,58,58,.2), rgba(255,100,0,.1)); border-color:var(--red); color:var(--red); }
.sys-btn:disabled { opacity:.3; cursor:default; }

.travel-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:10px; display:none; }
.travel-bar.show { display:block; }
.travel-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--cyan2)); width:0%; transition:width .1s linear; box-shadow:0 0 8px var(--cyan); }

/* ══════════════════════════════════════
   TRADE
══════════════════════════════════════ */
.trade-location {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px; margin-bottom:12px;
}
.trade-loc-name { font-family:var(--font-mono); font-size:14px; color:var(--cyan2); margin-bottom:2px; }
.trade-loc-sub { font-size:11px; color:var(--muted); margin-bottom:12px; }
.goods-list { display:flex; flex-direction:column; gap:8px; }
.good-row {
  display:flex; align-items:center; gap:10px;
  background:var(--card2); border-radius:10px; padding:10px 12px;
  border:1px solid var(--border);
}
.good-icon { font-size:24px; flex-shrink:0; }
.good-info { flex:1; }
.good-name { font-size:13px; font-weight:600; }
.good-price { font-family:var(--font-mono); font-size:11px; color:var(--gold); }
.good-owned { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
.good-trend { font-size:10px; }
.good-trend.up { color:var(--green); }
.good-trend.down { color:var(--red); }
.trade-btns { display:flex; gap:6px; }
.t-btn {
  padding:6px 12px; border-radius:8px; border:none; cursor:pointer;
  font-family:var(--font-main); font-size:11px; font-weight:700; transition:.2s;
}
.t-btn:active { transform:scale(.92); }
.t-btn.buy { background:rgba(0,255,136,.15); color:var(--green); border:1px solid rgba(0,255,136,.3); }
.t-btn.sell { background:rgba(255,58,58,.15); color:var(--red); border:1px solid rgba(255,58,58,.3); }
.t-btn:disabled { opacity:.25; cursor:default; }

.cargo-bar-wrap { margin-bottom:14px; }

/* ══════════════════════════════════════
   TECH TREE
══════════════════════════════════════ */
.tech-categories { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; }
.tech-cat-btn {
  flex-shrink:0; padding:6px 14px; border-radius:20px;
  border:1px solid var(--border2); background:var(--card);
  font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; transition:.2s;
}
.tech-cat-btn.active { background:rgba(0,200,255,.15); border-color:var(--cyan); color:var(--cyan); }

.tech-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.tech-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px; cursor:pointer; transition:.2s;
  position:relative; overflow:hidden;
}
.tech-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--border); transition:.3s;
}
.tech-card.researched::before { background:linear-gradient(90deg,var(--green),var(--cyan2)); box-shadow:0 0 8px var(--green); }
.tech-card.affordable::before { background:linear-gradient(90deg,var(--cyan),var(--purple)); }
.tech-card.researched { border-color:rgba(0,255,136,.2); }
.tech-card:active:not(.researched) { transform:scale(.96); }
.tech-icon { font-size:30px; margin-bottom:6px; }
.tech-name { font-size:12px; font-weight:700; margin-bottom:3px; }
.tech-effect { font-size:10px; color:var(--muted); margin-bottom:8px; line-height:1.3; }
.tech-cost { font-family:var(--font-mono); font-size:11px; color:var(--gold); }
.tech-done { font-family:var(--font-mono); font-size:11px; color:var(--green); }
.tech-locked { font-size:10px; color:var(--muted); font-style:italic; }

/* ══════════════════════════════════════
   COMBAT
══════════════════════════════════════ */
.combat-scene {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:16px; margin-bottom:14px;
  position:relative; overflow:hidden; min-height:180px;
}
.combat-scene::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 100%, rgba(255,50,50,.05) 0%, transparent 70%);
}
.combat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.combatant { text-align:center; flex:1; }
.combatant-icon { font-size:40px; margin-bottom:4px; }
.combatant-name { font-size:12px; font-weight:700; }
.combatant-hp { font-family:var(--font-mono); font-size:11px; color:var(--red); }
.vs-label { font-family:var(--font-mono); font-size:20px; color:var(--muted); }
.hp-bar-track { height:8px; background:rgba(255,255,255,.07); border-radius:4px; overflow:hidden; margin:6px 0; }
.hp-bar-fill { height:100%; border-radius:4px; transition:width .4s ease; }
.player-hp { background:linear-gradient(90deg,var(--green),var(--cyan2)); box-shadow:0 0 6px var(--green); }
.enemy-hp { background:linear-gradient(90deg,var(--red),var(--orange)); box-shadow:0 0 6px var(--red); }
.combat-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.combat-btn {
  padding:12px; border-radius:10px; border:none; cursor:pointer;
  font-family:var(--font-main); font-size:13px; font-weight:700; transition:.2s;
}
.combat-btn:active { transform:scale(.94); }
.combat-btn.attack { background:linear-gradient(135deg, rgba(255,60,60,.3), rgba(255,140,0,.2)); color:var(--orange); border:1px solid rgba(255,100,0,.4); }
.combat-btn.missile { background:linear-gradient(135deg, rgba(168,85,247,.3), rgba(0,200,255,.2)); color:var(--purple); border:1px solid rgba(168,85,247,.4); }
.combat-btn.repair { background:linear-gradient(135deg, rgba(0,255,136,.2), rgba(0,200,255,.1)); color:var(--green); border:1px solid rgba(0,255,136,.3); }
.combat-btn.flee { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
.combat-btn:disabled { opacity:.25; cursor:default; }
.combat-log {
  background:rgba(0,0,0,.3); border-radius:8px; padding:10px;
  font-family:var(--font-mono); font-size:10px; line-height:1.7;
  max-height:90px; overflow-y:auto; color:var(--muted);
}
.log-player { color:var(--cyan); }
.log-enemy { color:var(--red); }
.log-system { color:var(--gold); }
.no-combat {
  text-align:center; padding:30px 20px;
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; margin-bottom:14px;
}
.no-combat-icon { font-size:48px; margin-bottom:10px; }
.no-combat-text { font-size:14px; color:var(--muted); margin-bottom:14px; }
.find-battle-btn {
  background:linear-gradient(135deg,rgba(255,58,58,.25),rgba(255,140,0,.15));
  border:1px solid rgba(255,100,0,.4); border-radius:10px;
  padding:12px 24px; color:var(--orange); font-weight:700;
  font-family:var(--font-main); font-size:13px; cursor:pointer; transition:.2s;
}
.find-battle-btn:active { transform:scale(.95); }

/* ── TOAST ── */
.toast {
  position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,rgba(0,200,255,.2),rgba(0,255,229,.1));
  border:1px solid var(--cyan); color:var(--cyan);
  padding:8px 20px; border-radius:24px; font-family:var(--font-mono);
  font-size:12px; z-index:9990; opacity:0; transition:all .3s; pointer-events:none;
  white-space:nowrap; letter-spacing:.5px;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.bad { border-color:var(--red); color:var(--red); background:rgba(255,58,58,.1); }
.toast.good { border-color:var(--green); color:var(--green); background:rgba(0,255,136,.1); }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.8);
  z-index:500; display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--card2); border:1px solid var(--border2);
  border-radius:16px; padding:20px; width:100%; max-width:340px;
  animation:modal-in .25s ease;
}
@keyframes modal-in { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
.modal-title { font-family:var(--font-mono); font-size:16px; color:var(--cyan); margin-bottom:8px; }
.modal-body { font-size:13px; color:var(--muted); margin-bottom:16px; line-height:1.6; }
.modal-btns { display:flex; gap:8px; }
.modal-btn {
  flex:1; padding:10px; border-radius:10px; border:1px solid var(--border2);
  background:var(--card); font-family:var(--font-main); font-size:13px;
  font-weight:700; color:var(--text); cursor:pointer; transition:.2s;
}
.modal-btn.ok { border-color:var(--cyan); color:var(--cyan); background:rgba(0,200,255,.1); }
</style>
</head>
<body>

<div id="starfield"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<!-- ══ SCREEN: MINE ══ -->
<div class="screen active" id="screen-mine">
  <div class="hud">
    <div class="hud-stat">
      <div class="hud-val" id="hud-credits">0</div>
      <div class="hud-lbl">Кредиты</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hud-fuel">100</div>
      <div class="hud-lbl">Топливо</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <div class="ship-name" id="hud-location">🌍 Земля</div>
      <div class="hud-lbl">Система</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hud-hull">100%</div>
      <div class="hud-lbl">Корпус</div>
    </div>
  </div>

  <div class="scroll">
    <div class="mine-header">
      <div class="credits-display">
        <div class="credits-lbl">⚡ Кредиты</div>
        <div class="credits-val" id="credits-big">0</div>
        <div class="credits-cps" id="credits-cps">+0/сек</div>
      </div>
      <div class="level-info">
        <div class="level-num" id="level-num">1</div>
        <div class="level-lbl">Уровень</div>
      </div>
    </div>

    <div class="bar-row">
      <div class="bar-header"><span>XP</span><span id="xp-text">0/100</span></div>
      <div class="bar-track"><div class="bar-fill xp-fill" id="xp-bar" style="width:0%"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-header"><span>⚡ Энергия</span><span id="energy-text">100/100</span></div>
      <div class="bar-track"><div class="bar-fill energy-fill" id="energy-bar" style="width:100%"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-header"><span>🛡 Корпус</span><span id="hull-text">100/100</span></div>
      <div class="bar-track"><div class="bar-fill hull-fill" id="hull-bar" style="width:100%"></div></div>

  ],
};

const PIRATES = [
  { name:'Пират Зоро',   hp:60,  maxHp:60,  dmg:8,  reward:150, icon:'💀', tier:1 },
  { name:'Капитан Рэй',  hp:120, maxHp:120, dmg:14, reward:350, icon:'☠️', tier:2 },
  { name:'Адмирал Крог', hp:220, maxHp:220, dmg:22, reward:700, icon:'🏴‍☠️', tier:3 },
  { name:'Тёмный Лорд',  hp:400, maxHp:400, dmg:35, reward:1500,icon:'👾', tier:4 },
];

// ═══════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════
function defaultState() {
  return {
    credits: 0, totalEarned: 0,
    xp: 0, level: 1,
    energy: 100, maxEnergy: 100,
    hull: 100, maxHull: 100,
    fuel: 100, maxFuel: 100,
    missiles: 3, maxMissiles: 3,
    researchPoints: 0,
    currentSystem: 'sol',
    upgrades: {},        // id -> level (0-3)
    researched: {},      // id -> true
    cargo: {},           // goodId -> amount
    cargoMax: 20,
    combat: null,        // active combat state
    combatLog: [],
    prices: {},          // systemId -> { goodId -> price }
    killCount: 0,
    totalKills: 0,
    lastSave: Date.now(),
    autoCPS: 0,
  };
}

let G = loadSave() || defaultState();

// Offline earnings
if(G.lastSave) {
  const dt = Math.min((Date.now()-G.lastSave)/1000, 7200);
  const cps = calcCPS();
  if(cps>0 && dt>5) {
    const earned = Math.floor(dt*cps);
    G.credits += earned; G.totalEarned += earned;
    showToast(`⏰ Оффлайн: +${fmt(earned)} кредитов`, 'good');
  }
}

initPrices();

// ═══════════════════════════════════
//  CALCULATIONS
// ═══════════════════════════════════
function getUpgLevel(id) { return G.upgrades[id]||0; }

function calcClickPower() {
  let base = 1 + getUpgLevel('drill')*2;
  if(G.researched['nanodrill']) base += 5;
  if(G.researched['orbital'])   base += 15;
  return Math.ceil(base);
}

function calcCPS() {
  let cps = 0;
  if(G.researched['orbital'])  cps += 15;
  if(G.researched['stellar'])  cps += 50;
  return cps;
}

function calcMaxHull() {
  let base = 100;
  base += getUpgLevel('shield')*30;
  if(G.researched['armor']) base += 50;
  if(G.researched['regen']) base += 0; // handled separately
  return base;
}

function calcAttack() {
  let base = 10 + getUpgLevel('laser')*3;
  if(G.researched['plasma'])    base += 8;
  if(G.researched['ionbeam'])   base += 12;
  return base;
}

function calcMissileDmg() {
  let base = 30;
  if(G.researched['torpedo'])   base += 20;
  if(G.researched['antimatter']) base *= 2;
  return base;
}

function calcFuelCost(sys) {
  let cost = sys.fuelCost;
  if(G.researched['turbo'])   cost = Math.round(cost*0.7);
  if(getUpgLevel('engine')>0) cost = Math.round(cost*(1-getUpgLevel('engine')*0.2));
  return Math.max(5, cost);
}

function calcCargoMax() {
  return 20 + getUpgLevel('cargo')*10;
}

function calcCargoUsed() {
  return Object.values(G.cargo).reduce((a,b)=>a+b,0);
}

function xpForLevel(lvl) { return Math.floor(100*Math.pow(1.9,lvl-1)); }

function rpBonus() {
  return 1 + getUpgLevel('scanner')*0.5 + (G.researched['nanodrill']?0.2:0);
}

// ═══════════════════════════════════
//  PRICES
// ═══════════════════════════════════
function initPrices() {
  SYSTEMS.forEach(sys => {
    if(!G.prices[sys.id]) G.prices[sys.id] = {};
    sys.goods.forEach(gId => {
      if(!G.prices[sys.id][gId]) {
        const def = GOODS_DEF[gId];
        G.prices[sys.id][gId] = Math.round(def.basePrice*(0.7+Math.random()*0.6));
      }
    });
  });
}

function fluctuatePrices() {
  SYSTEMS.forEach(sys => {
    sys.goods.forEach(gId => {
      const def = GOODS_DEF[gId];
      const cur = G.prices[sys.id][gId];
      const change = (Math.random()-0.5)*0.1;
      G.prices[sys.id][gId] = Math.max(
        Math.round(def.basePrice*0.4),
        Math.min(Math.round(def.basePrice*2.2), Math.round(cur*(1+change)))
      );
    });
  });
}
setInterval(fluctuatePrices, 30000);

// ═══════════════════════════════════
//  MINING
// ═══════════════════════════════════
function handleMine(e) {
  if(G.energy<=0) { showToast('⚡ Нет энергии!', 'bad'); return; }
  const cp = calcClickPower();
  G.credits += cp; G.totalEarned += cp;
  G.xp += 1 + Math.floor(cp/5);
  G.energy = Math.max(0, G.energy-1);
  G.researchPoints += rpBonus()*0.1;

  // Level up
  const needed = xpForLevel(G.level);
  if(G.xp >= needed) {
    G.xp -= needed; G.level++;
    showToast(`🎉 Уровень ${G.level}! +ракета`, 'good');
    G.missiles = Math.min(G.maxMissiles+1, G.missiles+1);
    G.maxMissiles++;
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }

  spawnFloat(e, cp);
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  renderMine();
}

function spawnFloat(e, amount) {
  const el = document.createElement('div');
  el.className = 'float';
  el.style.left = (e.clientX-15+(Math.random()-.5)*30)+'px';
  el.style.top  = (e.clientY-20)+'px';
  el.textContent = '+'+fmt(amount);
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 780);
}

function buyUpgrade(id) {
  const def = UPGRADES_DEF.find(u=>u.id===id);
  const lvl = getUpgLevel(id);
  if(lvl>=def.cost.length) return;
  const cost = def.cost[lvl];
  if(G.credits<cost) { showToast('💸 Недостаточно кредитов', 'bad'); return; }
  G.credits -= cost;
  G.upgrades[id] = lvl+1;
  G.maxHull = calcMaxHull();
  showToast(`✅ ${def.name} → уровень ${lvl+1}`, 'good');
  if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  renderMine();
}

// ═══════════════════════════════════
//  GALAXY
// ═══════════════════════════════════
let canvas, ctx, selectedSystem = null, traveling = false, travelProgress = 0;

function initGalaxy() {
  canvas = document.getElementById('galaxy-canvas');
  const wrap = document.getElementById('galaxy-canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight - 0;
  drawGalaxy();
  canvas.addEventListener('click', onGalaxyClick);
}

function drawGalaxy() {
  if(!canvas||!ctx) { ctx = canvas?.getContext('2d'); if(!ctx) return; }
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // nebula bg
  const grad = ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.6);
  grad.addColorStop(0,'rgba(10,30,60,.4)'); grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // sector grid faint lines
  ctx.strokeStyle = 'rgba(0,150,200,.04)';
  ctx.lineWidth = 1;
  for(let i=0;i<=4;i++){
    ctx.beginPath(); ctx.moveTo(W*i/4,0); ctx.lineTo(W*i/4,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,H*i/4); ctx.lineTo(W,H*i/4); ctx.stroke();
  }

  // connections
  ctx.strokeStyle = 'rgba(0,180,255,.07)'; ctx.lineWidth = 1;
  for(let i=0;i<SYSTEMS.length;i++) for(let j=i+1;j<SYSTEMS.length;j++) {
    const a=SYSTEMS[i], b=SYSTEMS[j];
    const dx=(a.x-b.x)*W, dy=(a.y-b.y)*H;
    if(Math.sqrt(dx*dx+dy*dy)<W*.35) {
      ctx.beginPath();
      ctx.moveTo(a.x*W,a.y*H); ctx.lineTo(b.x*W,b.y*H);
      ctx.stroke();
    }
  }

  // systems
  SYSTEMS.forEach(sys => {
    const x=sys.x*W, y=sys.y*H;
    const isCurrent = sys.id===G.currentSystem;
    const isSelected = selectedSystem===sys.id;

    // glow
    if(isCurrent||isSelected) {
      const glowGrad = ctx.createRadialGradient(x,y,0,x,y,30);
      const col = isCurrent ? 'rgba(0,255,136,' : 'rgba(0,200,255,';
      glowGrad.addColorStop(0,col+'.3)'); glowGrad.addColorStop(1,col+'0)');
      ctx.fillStyle = glowGrad; ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.fill();
    }

    // circle
    ctx.beginPath(); ctx.arc(x,y,isCurrent?12:9,0,Math.PI*2);
    const colors = { home:'#00ff88', mining:'#ffd700', trade:'#00c8ff', danger:'#ff3a3a', science:'#a855f7', paradise:'#00ff88' };
    ctx.fillStyle = colors[sys.type]||'#888';
    if(isSelected) { ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
    ctx.fill();

    // label
    ctx.fillStyle = isCurrent ? '#00ff88' : '#8abbe0';
    ctx.font = `${isCurrent?12:10}px 'Share Tech Mono'`;
    ctx.textAlign = 'center';
    ctx.fillText(sys.name, x, y-16);

    // emoji
    ctx.font = '14px serif'; ctx.textAlign = 'center';
    ctx.fillText(sys.emoji, x, y+5);
  });

  // travel animation
  if(traveling && selectedSystem) {
    const from = SYSTEMS.find(s=>s.id===G.currentSystem);
    const to   = SYSTEMS.find(s=>s.id===selectedSystem);
    if(from&&to) {
      const px = (from.x+(to.x-from.x)*travelProgress)*W;
      const py = (from.y+(to.y-from.y)*travelProgress)*H;
      ctx.font = '18px serif'; ctx.textAlign='center';
      ctx.fillText('🚀',px,py);
    }
  }
}

function onGalaxyClick(e) {
  if(traveling) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX-rect.left)*(canvas.width/rect.width);
  const my = (e.clientY-rect.top)*(canvas.height/rect.height);
  const W=canvas.width, H=canvas.height;
  let hit = null, minD=999;
  SYSTEMS.forEach(sys => {
    const dx=sys.x*W-mx, dy=sys.y*H-my;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<30&&d<minD){minD=d;hit=sys;}
  });
  if(hit) {
    selectedSystem = hit.id;
    showSystemPanel(hit);
  } else {
    closePanel();
  }
  drawGalaxy();
}

function showSystemPanel(sys) {
  const panel = document.getElementById('systemPanel');
  const isCurrent = sys.id === G.currentSystem;
  const fuelCost = calcFuelCost(sys);
  document.getElementById('sysName').textContent = `${sys.emoji} ${sys.name} [${sys.sector}]`;
  document.getElementById('sysInfo').textContent = `${sys.desc} · Топливо: ${isCurrent?0:fuelCost} · Пираты: ${Math.round(sys.pirateChance*100)}%`;
  const flyBtn = document.getElementById('flyBtn');
  if(isCurrent) {
    flyBtn.textContent = '✅ Текущая система'; flyBtn.disabled = true;
  } else if(G.fuel < fuelCost) {
    flyBtn.textContent = `⚡ Нет топлива (${fuelCost})`; flyBtn.disabled = true;
  } else {
    flyBtn.textContent = `🚀 Лететь (-${fuelCost} топл.)`; flyBtn.disabled = false;
  }
  document.getElementById('travelBar').classList.remove('show');
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('systemPanel').classList.remove('open');
  selectedSystem = null;
  drawGalaxy();
}

function flyToSystem() {
  if(!selectedSystem || traveling) return;
  const sys = SYSTEMS.find(s=>s.id===selectedSystem);
  const fuelCost = calcFuelCost(sys);
  if(G.fuel < fuelCost) { showToast('⚡ Мало топлива!','bad'); return; }

  G.fuel -= fuelCost;
  traveling = true; travelProgress = 0;
  document.getElementById('flyBtn').disabled = true;
  const bar = document.getElementById('travelBar');
  const fill = document.getElementById('travelFill');
  bar.classList.add('show');

  const interval = setInterval(()=>{
    travelProgress += 0.04;
    fill.style.width = (travelProgress*100)+'%';
    drawGalaxy();
    if(travelProgress>=1) {
      clearInterval(interval);
      traveling = false;
      G.currentSystem = selectedSystem;
      // Pirate encounter chance
      if(Math.random()<sys.pirateChance) {
        const tier = Math.min(PIRATES.length-1, Math.floor(G.level/3));
        startCombat(tier);
        showToast(`☠️ Пираты! Враг перехватил вас в ${sys.name}!`,'bad');
        gotoScreen('combat');
      } else {
        showToast(`🚀 Прилетели в ${sys.name}!`,'good');
      }
      closePanel();
      updateHUD();
    }
  }, 60);
}

function renderTrade() {
  const sys = SYSTEMS.find(s=>s.id===G.currentSystem);
  G.cargoMax = calcCargoMax();
  const used = calcCargoUsed();
  const content = document.getElementById('tradeContent');

  let html = `
    <div class="section-hdr">Трюм корабля</div>
    <div class="cargo-bar-wrap">
      <div class="bar-header"><span>📦 Груз</span><span>${used}/${G.cargoMax} слотов</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${used/G.cargoMax*100}%;background:linear-gradient(90deg,var(--orange),var(--gold));box-shadow:0 0 6px var(--orange)"></div></div>
    </div>`;

  if(used>0) {
    html += `<div class="section-hdr">Ваш груз</div><div class="goods-list">`;
    Object.entries(G.cargo).forEach(([gId,amt])=>{
      if(amt<=0) return;
      const def = GOODS_DEF[gId];
      const sysPrice = G.prices[sys.id]?.[gId];
      const sellPrice = sysPrice ? Math.round(sysPrice*0.85) : null;
      html += `<div class="good-row">
        <div class="good-icon">${def.icon}</div>
        <div class="good-info">
          <div class="good-name">${def.name} ×${amt}</div>
          ${sellPrice?`<div class="good-price">Продать: ${fmt(sellPrice)}/шт</div>`:'<div class="good-owned">Нет спроса</div>'}
        </div>
        <div class="trade-btns">
          ${sellPrice?`<button class="t-btn sell" onclick="sellGood('${gId}',1)">Продать</button>`:''}
          ${sellPrice&&amt>1?`<button class="t-btn sell" onclick="sellGood('${gId}',${amt})">Всё</button>`:''}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="section-hdr">${sys.emoji} ${sys.name} — Рынок</div>`;
  html += `<div class="trade-location"><div class="trade-loc-name">${sys.name}</div><div class="trade-loc-sub">${sys.desc}</div><div class="goods-list">`;

  sys.goods.forEach(gId => {
    const def = GOODS_DEF[gId];
    const price = G.prices[sys.id][gId];
    const baseP = def.basePrice;
    const trend = price>baseP*1.1 ? 'up' : price<baseP*.9 ? 'down' : '';
    const trendIcon = trend==='up'?'▲ Высокая':trend==='down'?'▼ Низкая':'— Средняя';
    const canBuy = G.credits >= price && used < G.cargoMax;
    const owned = G.cargo[gId]||0;
    html += `<div class="good-row">
      <div class="good-icon">${def.icon}</div>
      <div class="good-info">
        <div class="good-name">${def.name}</div>
        <div class="good-price">💰 ${fmt(price)}</div>
        <div class="good-trend ${trend}">${trendIcon}</div>
        ${owned?`<div class="good-owned">Имеется: ${owned}</div>`:''}
      </div>
      <div class="trade-btns">
        <button class="t-btn buy" onclick="buyGood('${gId}')" ${canBuy?'':'disabled'}>Купить</button>
        ${owned>0?`<button class="t-btn sell" onclick="sellGood('${gId}',1)">Продать</button>`:''}
      </div>
    </div>`;
  });
  html += `</div></div>`;
  content.innerHTML = html;
}

function buyGood(gId) {
  const sys = SYSTEMS.find(s=>s.id===G.currentSystem);
  const price = G.prices[sys.id][gId];
  G.cargoMax = calcCargoMax();
  if(G.credits < price) { showToast('💸 Мало кредитов','bad'); return; }
  if(calcCargoUsed() >= G.cargoMax) { showToast('📦 Трюм полон!','bad'); return; }
  G.credits -= price;
  G.cargo[gId] = (G.cargo[gId]||0)+1;
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  renderTrade(); updateHUD();
}

function sellGood(gId, amt) {
  const sys = SYSTEMS.find(s=>s.id===G.currentSystem);
  const sysPrice = G.prices[sys.id]?.[gId];
  if(!sysPrice) { showToast('Нет спроса','bad'); return; }
  const toSell = Math.min(amt, G.cargo[gId]||0);
  if(toSell<=0) return;
  const sellPrice = Math.round(sysPrice*0.85)*toSell;
  G.credits += sellPrice; G.totalEarned += sellPrice;
  G.cargo[gId] = (G.cargo[gId]||0) - toSell;
  showToast(`💰 +${fmt(sellPrice)} кредитов`,'good');
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
  renderTrade(); updateHUD();
}

let activeTechCat = 'weapons';

function renderTech() {
  const cats = { weapons:'⚔️ Оружие', shields:'🛡 Защита', engines:'🚀 Двигатели', mining:'⛏️ Добыча' };
  const catHtml = Object.entries(cats).map(([k,v])=>
    `<button class="tech-cat-btn ${k===activeTechCat?'active':''}" onclick="setTechCat('${k}')">${v}</button>`
  ).join('');
  document.getElementById('techCats').innerHTML = catHtml;

  const list = TECH_DEF[activeTechCat];
  let html = '';
  list.forEach(t => {
    const done = G.researched[t.id];
    const reqMet = !t.req || G.researched[t.req];
    const canAfford = G.credits>=t.cost && G.researchPoints>=t.rp;
    const cls = done?'researched':(reqMet&&canAfford?'affordable':'');
    html += `<div class="tech-card ${cls}" onclick="researchTech('${t.id}')">
      <div class="tech-icon">${t.icon}</div>
      <div class="tech-name">${t.name}</div>
      <div class="tech-effect">${t.effect}</div>
      ${done
        ? `<div class="tech-done">✅ Исследовано</div>`
        : !reqMet
          ? `<div class="tech-locked">🔒 Требует предыдущую</div>`
          : `<div class="tech-cost">💰 ${fmt(t.cost)} · 🔬 ${t.rp} НО</div>`
      }
    </div>`;
  });
  document.getElementById('techGrid').innerHTML = html;
  document.getElementById('tech-credits').textContent = fmt(G.credits);
  document.getElementById('tech-rp').textContent = fmt(Math.floor(G.researchPoints));
}

function setTechCat(cat) { activeTechCat=cat; renderTech(); }

function researchTech(id) {
  const allTechs = Object.values(TECH_DEF).flat();
  const t = allTechs.find(x=>x.id===id);
  if(!t||G.researched[id]) return;
  if(t.req&&!G.researched[t.req]) { showToast('🔒 Сначала исследуйте предыдущую','bad'); return; }
  if(G.credits<t.cost) { showToast('💸 Мало кредитов','bad'); return; }
  if(G.researchPoints<t.rp) { showToast('🔬 Мало науч. очков','bad'); return; }
  G.credits -= t.cost; G.researchPoints -= t.rp;
  G.researched[id] = true;
  G.maxHull = calcMaxHull();
  showToast(`🔬 Исследовано: ${t.name}!`, 'good');
  if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  renderTech(); updateHUD();
}

function startCombat(tier) {
  const p = PIRATES[Math.min(tier, PIRATES.length-1)];
  G.combat = { ...p, hp:p.maxHp };
  G.combatLog = [`⚠️ Враг обнаружен: ${p.name} [${p.icon}]`];
}

function renderCombat() {
  const content = document.getElementById('combatContent');
  if(!G.combat) {
    const sys = SYSTEMS.find(s=>s.id===G.currentSystem);
    content.innerHTML = `
      <div class="no-combat">
        <div class="no-combat-icon">🛸</div>
        <div class="no-combat-text">В секторе <b>${sys.name}</b> пока тихо.<br>Шанс пирата: ${Math.round(sys.pirateChance*100)}%</div>
        <button class="find-battle-btn" onclick="findBattle()">🔍 Искать пиратов</button>
      </div>
      <div class="section-hdr">История боёв</div>
      <div style="background:var(--card);border-radius:10px;padding:12px;font-family:var(--font-mono);font-size:11px;color:var(--muted)">
        Уничтожено пиратов: <span style="color:var(--cyan)">${G.killCount}</span><br>
        Всего заработано в боях: <span style="color:var(--gold)">${fmt(G.totalKills||0)} кр.</span>
      </div>`;
    return;
  }

  const enemy = G.combat;
  const myHull = G.hull, myMaxHull = G.maxHull;
  const missiles = G.missiles;
  const logHtml = [...G.combatLog].slice(-6).map(l=>{
    const cls = l.startsWith('🔵')||l.startsWith('🚀') ? 'log-player' : l.startsWith('🔴') ? 'log-enemy' : 'log-system';
    return `<div class="${cls}">${l}</div>`;
  }).join('');

  content.innerHTML = `
    <div class="combat-scene">
      <div class="combat-header">
        <div class="combatant">
          <div class="combatant-icon">🚀</div>
          <div class="combatant-name">Ваш корабль</div>
          <div class="hp-bar-track"><div class="hp-bar-fill player-hp" style="width:${myHull/myMaxHull*100}%"></div></div>
          <div class="combatant-hp">${myHull}/${myMaxHull} ХП</div>
        </div>
        <div class="vs-label">VS</div>
        <div class="combatant">
          <div class="combatant-icon">${enemy.icon}</div>
          <div class="combatant-name">${enemy.name}</div>
          <div class="hp-bar-track"><div class="hp-bar-fill enemy-hp" style="width:${enemy.hp/enemy.maxHp*100}%"></div></div>
          <div class="combatant-hp">${enemy.hp}/${enemy.maxHp} ХП</div>
        </div>
      </div>
      <div class="combat-log">${logHtml}</div>
      <div class="combat-btns">
        <button class="combat-btn attack" onclick="combatAction('attack')">⚡ Атака<br><small>${calcAttack()} урона</small></button>
        <button class="combat-btn missile" onclick="combatAction('missile')" ${missiles>0?'':'disabled'}>🚀 Ракета (${missiles})<br><small>${calcMissileDmg()} урона</small></button>
        <button class="combat-btn repair" onclick="combatAction('repair')" ${G.credits>=200&&myHull<myMaxHull?'':'disabled'}>🔧 Ремонт<br><small>-200 кр, +25 хп</small></button>
        <button class="combat-btn flee" onclick="combatAction('flee')">💨 Бежать<br><small>-30% топлива</small></button>
      </div>
    </div>`;
}

function findBattle() {
  const sys = SYSTEMS.find(s=>s.id===G.currentSystem);
  if(Math.random()<sys.pirateChance+0.2) {
    const tier = Math.min(PIRATES.length-1, Math.floor(G.level/3));
    startCombat(tier);
    showToast('☠️ Пираты найдены!','bad');
  } else {
    showToast('🛸 Пространство чисто.','good');
  }
  renderCombat();
}

function combatAction(action) {
  if(!G.combat) return;
  const enemy = G.combat;
  let log = '';

  if(action==='attack') {
    let dmg = calcAttack();
    if(G.researched['ionbeam']&&Math.random()<.3) dmg = Math.round(dmg*1.5);
    dmg += Math.floor(Math.random()*6)-2;
    dmg = Math.max(1,dmg);
    enemy.hp -= dmg;
    log = `🔵 Атака: -${dmg} ХП врагу`;
  } else if(action==='missile') {
    if(G.missiles<=0) return;
    G.missiles--;
    let dmg = calcMissileDmg() + Math.floor(Math.random()*15);
    enemy.hp -= dmg;
    log = `🚀 Ракета: -${dmg} ХП врагу`;
  } else if(action==='repair') {
    if(G.credits<200||G.hull>=G.maxHull) return;
    G.credits -= 200;
    G.hull = Math.min(G.maxHull, G.hull+25);
    log = `🔧 Ремонт: +25 ХП`;
  } else if(action==='flee') {
    G.fuel = Math.max(0, G.fuel-Math.round(G.maxFuel*.3));
    G.combat = null;
    G.combatLog = [];
    showToast('💨 Вы сбежали!');
    renderCombat(); updateHUD(); return;
  }

  G.combatLog.push(log);

  // Check win
  if(enemy.hp<=0) {
    const reward = enemy.reward + Math.floor(G.level*50);
    G.credits += reward; G.totalEarned += reward;
    G.researchPoints += 10*rpBonus();
    G.killCount++; G.totalKills = (G.totalKills||0)+reward;
    G.xp += 50;
    G.combat = null;
    G.combatLog = [];
    showToast(`🏆 Победа! +${fmt(reward)} кредитов`, 'good');
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    renderCombat(); updateHUD(); return;
  }

  // Enemy attack
  let eDmg = enemy.dmg + Math.floor(Math.random()*8)-3;
  if(G.researched['mirror']&&Math.random()<.15) {
    eDmg = Math.round(eDmg*.5);
    G.combatLog.push(`🪞 Щит отразил часть урона!`);
  }
  if(G.researched['nullfield']) eDmg = Math.round(eDmg*.7);
  eDmg = Math.max(1,eDmg);
  G.hull = Math.max(0, G.hull-eDmg);
  G.combatLog.push(`🔴 Враг атакует: -${eDmg} ХП`);

  if(G.researched['regen']) {
    G.hull = Math.min(G.maxHull, G.hull+3);
    G.combatLog.push(`🔋 Регенерация: +3 ХП`);
  }

  // Check death
  if(G.hull<=0) {
    G.hull = 10;
    G.credits = Math.floor(G.credits*.7);
    G.combat = null; G.combatLog = [];
    showToast('💀 Корабль уничтожен! -30% кредитов','bad');
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
    renderCombat(); updateHUD(); return;
  }

  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
  renderCombat(); updateHUD();
}

let currentScreen = 'mine';

function gotoScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  currentScreen = name;
  if(name==='galaxy') { setTimeout(initGalaxy,50); }
  if(name==='trade')  { renderTrade(); }
  if(name==='tech')   { renderTech(); }
  if(name==='combat') { renderCombat(); }
  updateHUD();
}

// ═══════════════════════════════════
//  TOAST
// ═══════════════════════════════════
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.className = 'toast show '+(type||'');
  t.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════
let lastTick = Date.now();
function tick() {
  const now = Date.now();
  const dt = (now-lastTick)/1000; lastTick = now;

  const cps = calcCPS();
  if(cps>0) { G.credits+=cps*dt; G.totalEarned+=cps*dt; G.xp+=cps*dt*.05; G.researchPoints+=rpBonus()*dt*.02; }

  G.energy = Math.min(G.maxEnergy, G.energy+dt*4);
  G.fuel   = Math.min(G.maxFuel,   G.fuel+dt*.5);

  if(currentScreen==='mine') renderMine();
  updateHUD();
}

setInterval(tick, 250);
setInterval(()=>{ G.lastSave=Date.now(); saveSave(); }, 8000);

// ═══════════════════════════════════
//  SAVE/LOAD
// ═══════════════════════════════════
function saveSave() {
  try { localStorage.setItem('sr_idle_v1', JSON.stringify(G)); } catch(e){}
}
function loadSave() {
  try { const s=localStorage.getItem('sr_idle_v1'); return s?JSON.parse(s):null; } catch(e){return null;} 
}

// ═══════════════════════════════════
//  UTILS
// ═══════════════════════════════════
function fmt(n) {
  n = Math.floor(n);
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toString();
}

// ═══════════════════════════════════
//  STARS
// ═══════════════════════════════════
(function(){
  const sf = document.getElementById('starfield');
  for(let i=0;i<100;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*1.8+.3;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--delay:-${Math.random()*5}s`;
    sf.appendChild(s);
  }
})();

renderMine();
updateHUD();
